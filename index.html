<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TRICK BALL made by THRE3RIC</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #0b0c10; touch-action: none; font-family: 'Segoe UI', sans-serif; }
        
        /* 🔥 스타일리시 & 간지나는 SF 네온 스타일 인트로 화면 */
        #introScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(15,32,67,0.85), rgba(11,12,16,0.95));
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            color: white; z-index: 10; transition: opacity 1s ease-out; backdrop-filter: blur(5px);
        }
        .title-container { text-align: center; animation: pulse 2s infinite alternate; }
        h1 { font-size: 4rem; font-weight: 900; margin: 0; letter-spacing: 8px; color: #66fcf1; text-shadow: 0 0 20px #66fcf1, 0 0 40px #4169E1; }
        p { font-size: 1.1rem; color: #c5a059; margin-top: 5px; margin-bottom: 50px; letter-spacing: 4px; font-weight: 600; text-transform: uppercase; }
        
        button {
            padding: 18px 60px; font-size: 1.4rem; font-weight: bold; border: 2px solid #66fcf1;
            border-radius: 40px; background: transparent; color: #66fcf1; cursor: pointer;
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.2); transition: all 0.3s ease; letter-spacing: 2px;
        }
        button:hover { background: #66fcf1; color: #0b0c10; box-shadow: 0 0 30px #66fcf1; transform: translateY(-3px); }
        button:active { transform: scale(0.95); }

        @keyframes pulse {
            from { transform: scale(0.98); filter: brightness(0.9); }
            to { transform: scale(1.02); filter: brightness(1.2); }
        }

        /* 🏆 스테이지 클리어 UI */
        #clearScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: #fff; z-index: 9;
            display: none; opacity: 0; transition: opacity 1s ease;
        }
        #clearScreen h2 { font-size: 4.5rem; color: #ef476f; margin: 0; letter-spacing: 5px; text-shadow: 0 0 25px #ef476f; }
        #clearScreen p { font-size: 1.5rem; color: #ffd166; margin-top: 10px; }

        /* 게임 내부 조작 레이아웃 구역 */
        #gameUI { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; display: none; pointer-events: none; }
        .zone-guide { position: absolute; top: 0; height: 100%; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.1); font-weight: bold; font-size: 1.1rem; pointer-events: auto; }
        #leftZone { left: 0; width: 50%; border-right: 1px dashed rgba(255,255,255,0.08); }
        #rightZone { right: 0; width: 50%; }

        /* 가상 조이스틱 외형 */
        #joystickContainer {
            position: absolute; bottom: 60px; left: 60px; width: 130px; height: 130px;
            background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(102, 252, 241, 0.4);
            border-radius: 50%; display: flex; justify-content: center; align-items: center; pointer-events: none;
        }
        #joystickHandle { width: 55px; height: 55px; background: #66fcf1; border-radius: 50%; box-shadow: 0 0 15px #66fcf1; }

        #instructions { position: absolute; top: 20px; left: 20px; color: #fff; font-weight: bold; z-index: 6; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 8px; border-left: 4px solid #66fcf1; pointer-events: none; font-size: 0.85rem; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
</head>
<body>

    <div id="introScreen">
        <div class="title-container">
            <h1>TRICK BALL</h1>
            <p>made by THRE3RIC</p>
        </div>
        <button onclick="startGame()">ENTER TRACK</button>
    </div>

    <div id="clearScreen">
        <h2>STAGE CLEAR!</h2>
        <p>🎉 축하합니다! 모든 트랙을 돌파했습니다 🎉</p>
        <button onclick="location.reload()" style="margin-top:30px;">다시 하기</button>
    </div>

    <div id="instructions">
        [PC] 이동: WASD, 방향키 / 시선 전환: 마우스 드래그<br>
        [모바일] 이동: 좌측 조이스틱 / 시선 전환: 우측 화면 드래그
    </div>

    <div id="gameUI">
        <div id="leftZone" class="zone-guide">
            <div id="joystickContainer"><div id="joystickHandle"></div></div>
            <span>[ 조이스틱 이동 ]</span>
        </div>
        <div id="rightZone" class="zone-guide">
            <span>[ 드래그 시야회전 ]</span>
        </div>
    </div>

    <script>
        let scene, camera, renderer;
        let world, ballBody, ballMesh;
        let isGameStarted = false;
        let isCleared = false;

        // 3인칭 시점 변수
        let camRadius = 16;
        let camTheta = 0; 
        let camPhi = Math.PI / 3.5; 
        
        // 조작 데이터 및 상태
        let moveForce = { x: 0, y: 0 };
        let keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, w: false, a: false, s: false, d: false };
        let isRightDragging = false;
        let lastPointerPos = { x: 0, y: 0 };
        let leftPointerId = null;
        let leftStartPos = { x: 0, y: 0 };

        // 목표 지점(깃발) 및 폭죽 입자 시스템 변수
        let goalPosition = new THREE.Vector3(0, -14.5, -142);
        let fireworks = [];

        const joystickHandle = document.getElementById('joystickHandle');

        init();
        animate();

        function init() {
            // 1. 그래픽 환경 (신비로운 우주/하늘 노을빛 테마)
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1c29); 
            scene.fog = new THREE.FogExp2(0x1a1c29, 0.012);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // 조명
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
            dirLight.position.set(40, 90, 30);
            dirLight.castShadow = true;
            scene.add(dirLight);

            // 2. 물리 엔진
            world = new CANNON.World();
            world.gravity.set(0, -20, 0); 

            // 3. 플레이어 공 (구르는 디테일용 그리드 텍스처 대용 마찰 표현)
            const ballRadius = 1.2;
            const sphereGeo = new THREE.SphereGeometry(ballRadius, 32, 32);
            const sphereMat = new THREE.MeshStandardMaterial({ color: 0x66fcf1, roughness: 0.1, metalness: 0.6 });
            ballMesh = new THREE.Mesh(sphereGeo, sphereMat);
            ballMesh.castShadow = true;
            scene.add(ballMesh);

            const sphereShape = new CANNON.Sphere(ballRadius);
            ballBody = new CANNON.Body({ mass: 6, shape: sphereShape });
            ballBody.position.set(0, 4, 0); 
            ballBody.linearDamping = 0.25; 
            ballBody.angularDamping = 0.25;
            world.addBody(ballBody);

            // 4. 거대하고 조화로운 3D 트랙 스테이지 빌드
            buildEpicTrack();

            // 5. 완벽해진 조이스틱 및 입력 이벤트 매핑
            setupInputSystems();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // 🛣️ 초장거리 하이엔드 트랙 건설
        function buildEpicTrack() {
            // [구간 1] 넓은 스타팅 존
            createBlock(0, -1, 0, 12, 2, 12, 0x1f2833);
            
            // [구간 2] 슬림한 외나무다리 (image_4 무드)
            createBlock(0, -1, -16, 2, 2, 20, 0x45a29e);
            
            // [구간 3] 지그재그 징검다리 스텝 (image_2 무드)
            createBlock(-4, -1, -32, 3, 2, 3, 0xc5a059);
            createBlock(4, -1, -40, 3, 2, 3, 0xc5a059);
            createBlock(-2, -1, -48, 3, 2, 3, 0xc5a059);
            
            // [구간 4] 벽면이 있는 대형 가속 하프파이프 슬로프 (image_3 구현)
            let slopeZ = -72;
            let slopeY = -5;
            let slopeLen = 32;
            let slopeAngle = Math.PI / -10;
            // 슬로프 바닥
            createSlantedBlock(0, slopeY, slopeZ, 8, 1.5, slopeLen, 0x1f2833, slopeAngle);
            // 슬로프 왼쪽 안전벽
            createSlantedBlock(-4, slopeY + 1.5, slopeZ, 0.5, 3, slopeLen, 0x66fcf1, slopeAngle);
            // 슬로프 오른쪽 안전벽
            createSlantedBlock(4, slopeY + 1.5, slopeZ, 0.5, 3, slopeLen, 0x66fcf1, slopeAngle);

            // [구간 5] 중심잡기 얇은 더블 파이프 레일 (image_5 완벽 재현)
            createBlock(-0.7, -10.5, -104, 0.4, 0.4, 32, 0xffffff);
            createBlock(0.7, -10.5, -104, 0.4, 0.4, 32, 0xffffff);

            // [구간 6] 최종 골인 지점 광장
            createBlock(0, -15, -135, 16, 2, 30, 0x1f2833);

            // 🚩 포인트 깃발 생성 (기둥 + 삼각 깃발)
            createGoalFlag(goalPosition.x, goalPosition.y, goalPosition.z);
        }

        function createBlock(x, y, z, w, h, d, color) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.5 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, y, z);
            mesh.receiveShadow = true; mesh.receiveShadow = true;
            scene.add(mesh);

            const shape = new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2));
            const body = new CANNON.Body({ mass: 0, shape: shape });
            body.position.set(x, y, z);
            world.addBody(body);
        }

        function createSlantedBlock(x, y, z, w, h, d, color, angleX) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.4 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, y, z); mesh.rotation.x = angleX;
            mesh.receiveShadow = true; mesh.castShadow = true;
            scene.add(mesh);

            const shape = new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2));
            const body = new CANNON.Body({ mass: 0, shape: shape });
            body.position.set(x, y, z);
            body.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), angleX);
            world.addBody(body);
        }

        function createGoalFlag(x, y, z) {
            // 깃대
            const poleGeo = new THREE.CylinderGeometry(0.1, 0.1, 5, 16);
            const poleMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.8 });
            const pole = new THREE.Mesh(poleGeo, poleMat);
            pole.position.set(x, y + 2.5, z);
            pole.castShadow = true;
            scene.add(pole);

            // 네온 레드 삼각 천 깃발
            const flagGeo = new THREE.ConeGeometry(1, 2, 3);
            const flagMat = new THREE.MeshStandardMaterial({ color: 0xef476f, emissive: 0x3a000d });
            const flag = new THREE.Mesh(flagGeo, flagMat);
            flag.position.set(x, y + 4, z - 0.7);
            flag.rotation.x = Math.PI / 2;
            flag.rotation.z = Math.PI / 2;
            scene.add(flag);
        }

        // 🛠️ 조이스틱 방향 매핑 완전 리뉴얼 및 통합 핸들러
        function setupInputSystems() {
            window.addEventListener('keydown', e => { if (keys[e.key] !== undefined) keys[e.key] = true; });
            window.addEventListener('keyup', e => { if (keys[e.key] !== undefined) keys[e.key] = false; });

            const leftZone = document.getElementById('leftZone');

            // 좌측 조이스틱 물리 구동 엔진
            leftZone.addEventListener('pointerdown', e => {
                leftPointerId = e.pointerId;
                leftStartPos = { x: e.clientX, y: e.clientY };
            });
            
            leftZone.addEventListener('pointermove', e => {
                if (leftPointerId === e.pointerId) {
                    const dragX = e.clientX - leftStartPos.x;
                    const dragY = e.clientY - leftStartPos.y;
                    const dist = Math.sqrt(dragX * dragX + dragY * dragY);
                    const maxLimit = 55; 

                    let cx = dragX;
                    let cy = dragY;
                    if (dist > maxLimit) {
                        cx = (dragX / dist) * maxLimit;
                        cy = (dragY / dist) * maxLimit;
                    }

                    joystickHandle.style.transform = `translate(${cx}px, ${cy}px)`;

                    // 방향 정상화 부품: 조이스틱은 2D 스크린 공간이므로 화면상 밀어올릴 때(드래그 -Y축) 전진해야 함
                    moveForce.x = cx / maxLimit;
                    moveForce.y = cy / maxLimit;
                }
            });

            const resetJoystick = e => {
                if (leftPointerId === e.pointerId) {
                    leftPointerId = null;
                    moveForce = { x: 0, y: 0 };
                    joystickHandle.style.transform = `translate(0px, 0px)`;
                }
            };
            leftZone.addEventListener('pointerup', resetJoystick);
            leftZone.addEventListener('pointercancel', resetJoystick);

            // 우측 화면 시선 드래그 처리
            window.addEventListener('pointerdown', e => {
                if(e.clientX > window.innerWidth / 2 || !isGameStarted) {
                    isRightDragging = true;
                    lastPointerPos = { x: e.clientX, y: e.clientY };
                }
            });
            
            window.addEventListener('pointermove', e => {
                if (isRightDragging) {
                    const dx = e.clientX - lastPointerPos.x;
                    const dy = e.clientY - lastPointerPos.y;
                    camTheta -= dx * 0.006;
                    camPhi -= dy * 0.006;
                    camPhi = Math.max(0.1, Math.min(Math.PI / 2.3, camPhi)); 
                    lastPointerPos = { x: e.clientX, y: e.clientY };
                }
            });
            window.addEventListener('pointerup', () => isRightDragging = false);
        }

        function startGame() {
            const intro = document.getElementById('introScreen');
            intro.style.opacity = '0';
            setTimeout(() => {
                intro.style.display = 'none';
                document.getElementById('gameUI').style.display = 'block';
                isGameStarted = true;
            }, 800);
        }

        // 🎆 화려한 3D 폭죽 입자 트리거 함수
        function spawnFirework() {
            const particleCount = 60;
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const velocities = [];
            const colors = [];

            const colorOptions = [0xff595e, 0xffca3a, 0x8ac926, 0x1982c4, 0x6a4c93, 0x66fcf1];
            const chosenColor = new THREE.Color(colorOptions[Math.floor(Math.random() * colorOptions.length)]);

            // 깃발 주위 무작위 공중 스폰 위치 계산
            const originX = goalPosition.x + (Math.random() * 10 - 5);
            const originY = goalPosition.y + 6 + (Math.random() * 4);
            const originZ = goalPosition.z + (Math.random() * 10 - 5);

            for (let i = 0; i < particleCount; i++) {
                positions.push(originX, originY, originZ);
                
                // 사방으로 퍼지는 구체형 속도값 계산
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                const speed = 0.1 + Math.random() * 0.2;

                velocities.push(
                    speed * Math.sin(phi) * Math.sin(theta),
                    speed * Math.cos(phi) + 0.05, // 살짝 위로 솟구치게
                    speed * Math.sin(phi) * Math.cos(theta)
                );

                colors.push(chosenColor.r, chosenColor.g, chosenColor.b);
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({ size: 0.35, vertexColors: true, transparent: true, opacity: 1 });
            const pSystem = new THREE.Points(geometry, material);
            
            scene.add(pSystem);
            fireworks.push({ system: pSystem, velocities: velocities, age: 0, maxAge: 80 });
        }

        function updateFireworks() {
            for (let i = fireworks.length - 1; i >= 0; i--) {
                const f = fireworks[i];
                f.age++;
                
                const posArr = f.system.geometry.attributes.position.array;
                const vArr = f.velocities;

                for (let j = 0; j < posArr.length; j += 3) {
                    posArr[j] += vArr[j];     // X 이동
                    posArr[j+1] += vArr[j+1]; // Y 이동 (속도)
                    posArr[j+2] += vArr[j+2]; // Z 이동
                    vArr[j+1] -= 0.003;       // 중력 효과 추가로 입자가 떨어짐
                }
                f.system.geometry.attributes.position.needsUpdate = true;
                f.system.material.opacity = 1 - (f.age / f.maxAge); // 자연스러운 페이드아웃

                if (f.age >= f.maxAge) {
                    scene.remove(f.system);
                    fireworks.splice(i, 1);
                }
            }
        }

        // 🔄 핵심 드로우 애니메이션 프레임 (게임 루프)
        function animate() {
            requestAnimationFrame(animate);

            world.step(1 / 60);

            if (!isGameStarted) {
                // 😎 [간지 포인트 1] 인트로 화면 시네마틱 연출: 카메라가 공 주변을 서서히 자동 회전하며 고급스러운 무드 조성
                camTheta += 0.004;
            } else {
                // 🧭 [방향성 수정 핵심] 카메라의 정면/우측 벡터를 실시간 연산하여 시점 기준 완벽 매핑
                const forwardVec = new THREE.Vector3();
                camera.getWorldDirection(forwardVec);
                forwardVec.y = 0; forwardVec.normalize();
                
                const rightVec = new THREE.Vector3().crossVectors(camera.up, forwardVec).normalize();

                // 조이스틱 및 PC 키보드 입력 매싱
                let inputX = moveForce.x;
                let inputY = moveForce.y; // 스크린 드래그 하향(+Y)일 때 물리 후진(+Y)해야 맞음
                
                if (keys.ArrowUp || keys.w) inputY = -1;
                if (keys.ArrowDown || keys.s) inputY = 1;
                if (keys.ArrowLeft || keys.a) inputX = -1;
                if (keys.ArrowRight || keys.d) inputX = 1;

                // 시야 기준 정방향 힘 주입 연산
                const enginePower = 65; 
                const finalForceX = (rightVec.x * inputX + forwardVec.x * -inputY) * enginePower;
                const finalForceZ = (rightVec.z * inputX + forwardVec.z * -inputY) * enginePower;
                ballBody.applyForce(new CANNON.Vec3(finalForceX, 0, finalForceZ), ballBody.position);

                // 낙사 리스폰 기준점
                if (ballBody.position.y < -30) {
                    ballBody.position.set(0, 4, 0);
                    ballBody.velocity.set(0, 0, 0);
                    ballBody.angularVelocity.set(0, 0, 0);
                }

                // 🏁 깃발 도달성공 (클리어 이벤트 트리거) 체크
                const distToGoal = ballMesh.position.distanceTo(goalPosition);
                if (distToGoal < 3.5 && !isCleared) {
                    isCleared = true;
                    document.getElementById('clearScreen').style.display = 'flex';
                    setTimeout(() => { document.getElementById('clearScreen').style.opacity = '1'; }, 50);
                }

                // 클리어 시 주기적으로 랜덤 위치 폭죽 생성
                if (isCleared && Math.random() < 0.15) {
                    spawnFirework();
                }
            }

            // 그래픽 메쉬 동기화
            ballMesh.position.copy(ballBody.position);
            ballMesh.quaternion.copy(ballBody.quaternion);

            // 폭죽 파티클 프레임 업데이트 
            updateFireworks();

            // 3인칭 추적 카메라 고정 수식
            const targetCamX = ballMesh.position.x + camRadius * Math.sin(camPhi) * Math.sin(camTheta);
            const targetCamY = ballMesh.position.y + camRadius * Math.cos(camPhi);
            const targetCamZ = ballMesh.position.z + camRadius * Math.sin(camPhi) * Math.cos(camTheta);
            
            camera.position.set(targetCamX, targetCamY, targetCamZ);
            camera.lookAt(ballMesh.position);

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
